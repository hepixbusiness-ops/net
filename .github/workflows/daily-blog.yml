name: Génération Article Blog Quotidien

on:
  schedule:
    # 07h00 UTC = 08h00 Cameroun (WAT = UTC+1)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      theme:
        description: 'Thème de l''article (optionnel)'
        required: false

jobs:
  generate-article:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Générer et publier l'article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CUSTOM_THEME: ${{ github.event.inputs.theme }}
        run: node scripts/generate-blog-post.mjs
